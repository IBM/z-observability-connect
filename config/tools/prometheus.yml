global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
- job_name: 'prometheus'
  static_configs:
  - targets: [ "localhost:9090" ]
- job_name: "otel-collector"
  scrape_interval: 10s
  static_configs:
  - targets: [ "<telemetry-controller-fqdn>:<zos-metrics-port>" ]
  - targets: [ "<telemetry-controller-fqdn>:<internal-metrics-port>" ]
